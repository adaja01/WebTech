<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Register a new CS2 League account.">
    <title>CS2 | Register</title>

    <!-- favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/group41/assets/favicon/apple-touch-icon.png">
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/group41/assets/favicon/favicon-32x32.png">
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/group41/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/group41/assets/favicon/site.webmanifest">

    <!-- styles -->
    <link rel="stylesheet" href="/group41/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Cormorant+Garamond:ital,wght@1,300..700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet">
  </head>
  <body>
    <header>
      <nav class="nav">
        <ul class="nav__list">
          <li class="nav__item">
            <a href="index.html" class="nav__link">LeaderBoard</a>
          </li>
          <li class="nav__item">
            <a href="scores.html" class="nav__link">Scores</a>
          </li>
          <li class="nav__item">
            <a href="upcoming.html" class="nav__link">Upcoming</a>
          </li>
          <li class="nav__item">
            <a href="all-teams.html" class="nav__link">Teams</a>
          </li>
          <li class="nav__item">
            <a href="all-players.html" class="nav__link">Players</a>
          </li>
          <li class="nav__item">
            <a href="info.html" class="nav__link">Info</a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="page-header">
        <h1 class="page-header__title">Register</h1>
        <p class="page-header__subtitle">
          Create a new account to join the CS2 League community.
        </p>
      </section>

      <div class="auth-form-container">
        <form class="auth-form" id="register-form">
          <div class="form-group">
            <label for="first-name" class="form-label">First Name:</label>
            <input
              type="text"
              id="first-name"
              name="first_name"
              class="form-input"
              required
              aria-label="First name">
          </div>

          <div class="form-group">
            <label for="last-name" class="form-label">Last Name:</label>
            <input
              type="text"
              id="last-name"
              name="last_name"
              class="form-input"
              required
              aria-label="Last name">
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email:</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              required
              aria-label="Email address">
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password:</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              required
              aria-label="Password">
          </div>

          <div class="form-group">
            <label for="password-confirm" class="form-label">
              Confirm Password:
            </label>
            <input
              type="password"
              id="password-confirm"
              name="password_confirm"
              class="form-input"
              required
              aria-label="Confirm password">
          </div>

          <div class="form-group">
            <label for="favorite-team" class="form-label">
              Favorite Team:
            </label>
            <select
              id="favorite-team"
              name="favorite_team_id"
              class="form-input"
              required
              aria-label="Select favorite team">
              <option value="">-- Select a team --</option>
            </select>
          </div>

          <button type="submit" class="form-button">Register</button>

          <div id="error-message" class="form-error" style="display: none;"></div>
        </form>

        <p class="auth-form__footer">
          Already have an account? <a href="login.html" class="auth-form__link">Login here</a>
        </p>
      </div>
    </main>

    <footer>
      <p class="footer__text">
        Deliverable for the INFOB2WT course at Utrecht University - Written by
        group 41
      </p>
    </footer>

    <script src="js/auth.js"></script>
    <script>
      /**
       * Load teams from API and populate select dropdown
       */
       async function loadTeams() {
         try {
           const response = await apiCall("/api/teams");
           const teams = await response.json();
          const select = document.getElementById("favorite-team");

          teams.forEach((team) => {
            const option = document.createElement("option");
            option.value = team.id;
            option.textContent = team.name;
            select.appendChild(option);
          });
        } catch (error) {
          console.error("Error loading teams:", error);
        }
      }

      /**
       * Handle register form submission
       */
      document
        .getElementById("register-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const firstName = document.getElementById("first-name").value;
          const lastName = document.getElementById("last-name").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const passwordConfirm = document.getElementById(
            "password-confirm"
          ).value;
          const favoriteTeamId = parseInt(
            document.getElementById("favorite-team").value
          );
          const errorDiv = document.getElementById("error-message");

          // Validate passwords match
          if (password !== passwordConfirm) {
            errorDiv.textContent = "Passwords do not match!";
            errorDiv.style.display = "block";
            return;
          }

          try {
            const response = await register(
              firstName,
              lastName,
              email,
              password,
              favoriteTeamId
            );

            if (response.error) {
              errorDiv.textContent = response.error;
              errorDiv.style.display = "block";
            } else {
              // Registration successful, redirect to login
              window.location.href = "login.html?registered=true";
            }
          } catch (error) {
            errorDiv.textContent =
              "An error occurred during registration. Please try again.";
            errorDiv.style.display = "block";
            console.error("Registration error:", error);
          }
        });

      // Load teams on page load
      document.addEventListener("DOMContentLoaded", loadTeams);
    </script>
  </body>
</html>
