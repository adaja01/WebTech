<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The previous scores and upcoming games of Faze Clan."
    />
    <title>CS2 | All Players</title>

    <!-- favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="../assets/favicon/site.webmanifest" />

    <!-- styles -->
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Cormorant+Garamond:ital,wght@1,300..700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav class="nav">
        <ul class="nav__list">
          <li class="nav__item">
            <a href="index.html" class="nav__link">LeaderBoard</a>
          </li>
          <li class="nav__item">
            <a href="scores.html" class="nav__link">Scores</a>
          </li>
          <li class="nav__item">
            <a href="upcoming.html" class="nav__link">Upcoming</a>
          </li>
          <li class="nav__item">
            <a href="all-teams.html" class="nav__link">Teams</a>
          </li>
          <li class="nav__item">
            <a
              href="all-players.html"
              aria-current="page"
              class="nav__link nav__link--active"
              >Players</a
            >
          </li>
          <li class="nav__item">
            <a href="info.html" class="nav__link">Info</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="page-header">
        <h1 class="page-header__title">CS2 Players</h1>
        <p class="page-header__subtitle">
          All the players in the CS2 competition.
        </p>
      </section>
      <table class="member-table">
        <thead>
          <tr>
            <th class="member-table__header">Player</th>
            <th class="member-table__header"></th>
          </tr>
        </thead>
        <tbody id="players-body"></tbody>
      </table>
    </main>
    <footer>
      <p class="footer__text">
        Deliverable for the INFOB2WT course at Utrecht University - Written by
        group 41
      </p>
    </footer>
    <script>
      async function loadPlayers() {
        const res = await fetch("/api/players");
        const players = await res.json();

        const tbody = document.getElementById("players-body");

        tbody.innerHTML = players
          .map(
            (player) => `
      <tr class="member-table__row">
        <td class="member-table__cell">
          <a href="player.html?id=${player.id}" target="_blank">
            ${player.first_name} ${player.last_name}
          </a>
        </td>
        <td class="member-table__cell">
          <img src="${player.photo}" alt="${player.first_name} photo" class="history-article__logo">
        </td>
      </tr>
    `,
          )
          .join("");
      }

      loadPlayers();
    </script>
  </body>
</html>
