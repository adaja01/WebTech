<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Information about a CS2 League team, including its players and games.">
    <title>CS2 | Team</title>

    <!-- favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/favicon/apple-touch-icon.png">
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon/favicon-32x32.png">
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="assets/favicon/site.webmanifest">

    <!-- styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Cormorant+Garamond:ital,wght@1,300..700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet">

    <script src="js/auth.js"></script>
  </head>
  <body>
    <header>
      <nav class="team-nav nav">
        <ul class="nav__list">
          <li class="nav__item">
            <a id="info-link" class="nav__link nav__link--active">Info</a>
          </li>
          <li class="nav__item">
            <a id="players-link" class="nav__link">Players</a>
          </li>
          <li class="nav__item">
            <a id="games-link" class="nav__link">Games</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="page-header">
        <h1 id="team-name" class="page-header__title">CS2 Team</h1>
      </section>
    </main>
    <footer>
      <p class="footer__text">
        Deliverable for the INFOB2WT course at Utrecht University - Written by
        group 41
      </p>
    </footer>
    <script>
      const params = new URLSearchParams(window.location.search);
      const teamId = params.get("id");

      document.getElementById("info-link").href = `team.html?id=${teamId}`;
      document.getElementById("players-link").href =
        `team-players.html?id=${teamId}`;
       document.getElementById("games-link").href =
         `team-games.html?id=${teamId}`;

       apiCall(`/api/teams/${teamId}`)
         .then((res) => res.json())
         .then((team) => {
           document.getElementById("team-name").textContent = team.name;
         });
    </script>
  </body>
</html>
