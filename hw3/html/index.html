<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The previous scores and upcoming games of Faze Clan."
    />
    <title>CS2 | Leaderboard</title>

    <!-- favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="../assets/favicon/site.webmanifest" />

    <!-- styles -->
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Cormorant+Garamond:ital,wght@1,300..700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav class="nav">
        <ul class="nav__list">
          <li class="nav__item">
            <a
              href="index.html"
              aria-current="page"
              class="nav__link nav__link--active"
              >LeaderBoard</a
            >
          </li>
          <li class="nav__item">
            <a href="scores.html" class="nav__link">Scores</a>
          </li>
          <li class="nav__item">
            <a href="upcoming.html" class="nav__link">Upcoming</a>
          </li>
          <li class="nav__item">
            <a href="all-teams.html" class="nav__link">Teams</a>
          </li>
          <li class="nav__item">
            <a href="all-players.html" class="nav__link">Players</a>
          </li>
          <li class="nav__item">
            <a href="info.html" class="nav__link">Info</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="page-header">
        <h1 class="page-header__title">CS2 Leaderboard</h1>
        <p class="page-header__subtitle">
          The Leaderboard of the CS2 competition.
        </p>
      </section>
      <table class="member-table">
        <thead>
          <tr>
            <th class="member-table__header"></th>
            <th class="member-table__header">Name</th>
            <th class="member-table__header">Points</th>
            <th class="member-table__header">Matches Played</th>
            <th class="member-table__header">Wins</th>
            <th class="member-table__header">Losses</th>
            <th class="member-table__header">Map difference</th>
          </tr>
        </thead>
        <tbody id="scores-body"></tbody>
      </table>
    </main>
    <footer>
      <p class="footer__text">
        Deliverable for the INFOB2WT course at Utrecht University - Written by
        group 41
      </p>
    </footer>
    <script>
      async function loadLeaderboard() {
        const response = await fetch(`/api/leaderboard`);
        const games = await response.json();
        let tbody = document.getElementById("scores-body");
        tbody.innerHTML = games
          .map(
            (game) => `
                  <tr class="member-table__row">
                  <td class="member-table__cell"><img class="history-article__logo" src=${game.logo} alt=${game.name}></td>
                  <td class="member-table__cell"><a href="team.html?id=${game.id}" target="_blank">${game.name}</a></td>
                  <td class="member-table__cell">${game.points}</td>
                  <td class="member-table__cell">${game.total}</td>
                  <td class="member-table__cell">${game.wins}</td>
                  <td class="member-table__cell">${game.losses}</td>
                  <td class="member-table__cell">${game.map_diff}</td>
                  </tr>
              `,
          )
          .join("");
      }

      loadLeaderboard();
    </script>
  </body>
</html>
