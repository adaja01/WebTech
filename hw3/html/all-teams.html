<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="All participating teams in CS2 League.">
    <title>CS2 | All Teams</title>

    <!-- favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicon/apple-touch-icon.png">
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/favicon/favicon-32x32.png">
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="../assets/favicon/site.webmanifest">

    <!-- styles -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Cormorant+Garamond:ital,wght@1,300..700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet">

    <script src="../js/auth.js"></script>
  </head>
  <body>
    <header>
      <nav class="nav">
        <ul class="nav__list">
          <li class="nav__item">
            <a href="index.html" class="nav__link">LeaderBoard</a>
          </li>
          <li class="nav__item">
            <a href="scores.html" class="nav__link">Scores</a>
          </li>
          <li class="nav__item">
            <a href="upcoming.html" class="nav__link">Upcoming</a>
          </li>
          <li class="nav__item">
            <a
              href="all-teams.html"
              aria-current="page"
              class="nav__link nav__link--active"
              >Teams</a
            >
          </li>
          <li class="nav__item">
            <a href="all-players.html" class="nav__link">Players</a>
          </li>
          <li class="nav__item">
            <a href="info.html" class="nav__link">Info</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="page-header">
        <h1 class="page-header__title">CS2 Teams</h1>
        <p class="page-header__subtitle">
          All the teams in the CS2 competition.
        </p>
      </section>
      <table class="member-table">
        <thead>
          <tr>
            <th class="member-table__header">Team</th>
            <th class="member-table__header"></th>
          </tr>
        </thead>
         <tbody id="teams-body"></tbody>
       </table>
     </main>
     <footer>
       <p class="footer__text">
         Deliverable for the INFOB2WT course at Utrecht University - Written by
         group 41
       </p>
      </footer>
       <script>
         async function loadTeams() {
           const res = await apiCall("/api/teams");
          const teams = await res.json();
          const user = await getCurrentUser();

          const tbody = document.getElementById("teams-body");

          // Sort teams to put favorite team first
          if (user && user.favorite_team_id) {
            teams.sort((a, b) => {
              if (a.id === user.favorite_team_id) return -1;
              if (b.id === user.favorite_team_id) return 1;
              return 0;
            });
          }

          tbody.innerHTML = teams
            .map(
              (team) => `
        <tr class="member-table__row" data-team-id="${team.id}">
          <td class="member-table__cell">
            <a href="team.html?id=${team.id}" target="_blank">
              ${team.name}
            </a>
          </td>
          <td class="member-table__cell">
            <img src="${team.logo}" alt="${team.name} logo" class="history-article__logo">
          </td>
        </tr>
      `,
            )
            .join("");
          await highlightFavoriteTeam();
        }

        loadTeams();
     </script>
  </body>
</html>
