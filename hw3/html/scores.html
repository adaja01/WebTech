<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <meta
      name="description"
      content="The previous scores of CS2 League.">
    <title>CS2 | Scores</title>

    <!-- favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicon/apple-touch-icon.png">
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/favicon/favicon-32x32.png">
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="../assets/favicon/site.webmanifest">

    <!-- styles -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Cormorant+Garamond:ital,wght@1,300..700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet">

    <script src="../js/auth.js"></script>
  </head>
  <body>
    <header>
      <nav class="nav">
        <ul class="nav__list">
          <li class="nav__item">
            <a href="index.html" class="nav__link">LeaderBoard</a>
          </li>
          <li class="nav__item">
            <a
              href="scores.html"
              aria-current="page"
              class="nav__link nav__link--active"
              >Scores</a
            >
          </li>
          <li class="nav__item">
            <a href="upcoming.html" class="nav__link">Upcoming</a>
          </li>
          <li class="nav__item">
            <a href="all-teams.html" class="nav__link">Teams</a>
          </li>
          <li class="nav__item">
            <a href="all-players.html" class="nav__link">Players</a>
          </li>
          <li class="nav__item">
            <a href="info.html" class="nav__link">Info</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="page-header">
        <h1 class="page-header__title">CS2 previous scores</h1>
        <p class="page-header__subtitle">
          The previous scores of the CS2 competition.
        </p>
      </section>
      <table class="member-table">
        <thead>
          <tr>
            <th class="member-table__header">Date</th>
            <th class="member-table__header">Home Team</th>
            <th class="member-table__header">Away Team</th>
            <th class="member-table__header">Score</th>
          </tr>
        </thead>
        <tbody id="scores-body"></tbody>
      </table>
      <button id="load-more-btn" onclick="loadMoreScores()">Show more</button>
    </main>
    <footer>
      <p class="footer__text">
        Deliverable for the INFOB2WT course at Utrecht University - Written by
        group 41
      </p>
    </footer>
    <script>
      let offset = 0;
      const limit = 10;
      async function loadMoreScores() {
        const response = await fetch(
          `/api/games/scores?limit=${limit}&offset=${offset}`,
        );
        const games = await response.json();
        let tbody = document.getElementById("scores-body");
        tbody.innerHTML += games
          .map(
            (game) => `
                  <tr class="member-table__row" data-team-id="${game.home_team_id}">
                  <td class="member-table__cell">${game.date}</td>
                  <td class="member-table__cell"><a href="team.html?id=${game.home_team_id}" target="_blank">${game.home_team}</a></td>
                  <td class="member-table__cell"><a href="team.html?id=${game.away_team_id}" target="_blank">${game.away_team}</a></td>
                  <td class="member-table__cell">${game.home_score} - ${game.away_score}</td>
                  </tr>
              `,
          )
          .join("");
        offset += 10;
        if (games.length < limit) {
          document.getElementById("load-more-btn").style.display = "none";
        }
        highlightFavoriteTeam();
      }

      // load first 10 on page load
      loadMoreScores();
    </script>
  </body>
</html>
