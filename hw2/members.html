<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="The members of FaZe Clan, including both content and esports members.">
    <title>FaZe Clan | Members</title>

    <!-- favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/favicon/apple-touch-icon.png">
    <link

      type="image/png"
      sizes="32x32"
      href="assets/favicon/favicon-32x32.png">

      sizes="16x16"

    <!-- styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Cormorant+Garamond:ital,wght@1,300..700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet">

    <!-- scripts -->
    <script src="js/appearance-menus.js" defer></script>
    <script src="js/tooltips.js" defer></script>
  </head>
  <body>
    <header>
      <nav class="nav">
        <ul class="nav__list">
          <li class="nav__item">
            <a href="index.html" class="nav__link">Home</a>
          </li>
          <li class="nav__item">
            <a href="history.html" class="nav__link">History</a>
          </li>
          <li class="nav__item">
            <a
              href="members.html"
              aria-current="page"
              class="nav__link nav__link--active"
              >Members</a
            >
          </li>
          <li class="nav__item">
            <a href="achievements.html" class="nav__link">Achievements</a>
          </li>
          <li class="nav__item">
            <a href="contact.html" class="nav__link">Contact</a>
          </li>
        </ul>

      <div class="menu-container">
        <label class="menu-container__title">Style Menu:</label>
        <select id="element-select">
          <option value="" disabled selected>Choose element</option>
        </select>
        <select id="appearance-select">
          <option value="" disabled selected>Choose option</option>
          <option value="font-size">Font Size</option>
          <option value="font-color">Font Color</option>
        </select>
      </div>

        <h1 class="page-header__title">FaZe Members</h1>
        <p class="page-header__subtitle">

        </p>
      </section>
      <section id="upload-section">
        <h2>Select the players.json file:</h2>
        <label for="members-input">Upload a file</label>
        <input type="file" id="members-input" accept=".json">
      </section>
      <div id="members-display"></div>
    </main>
    <footer>
      <p class="footer__text">
        Deliverable for the INFOB2WT course at Utrecht University - Written by group 41
