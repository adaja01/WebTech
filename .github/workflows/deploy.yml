name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  deploy-hw1:
    name: Deploy hw1
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create _headers file
        run: |
          echo "/*" > ./hw1/_headers
          echo "  Cache-Control: no-store, no-cache, must-revalidate" >> ./hw1/_headers
          echo "  Pragma: no-cache" >> ./hw1/_headers

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./hw1 --project-name=web-uu --branch=hw1 --commit-dirty=true
